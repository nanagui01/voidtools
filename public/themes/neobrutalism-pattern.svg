<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Cross marks (estilo Figma) -->
  <g stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round">
    <line x1="18" y1="12" x2="18" y2="24"/>
    <line x1="12" y1="18" x2="24" y2="18"/>

    <line x1="84" y1="42" x2="84" y2="54"/>
    <line x1="78" y1="48" x2="90" y2="48"/>

    <line x1="48" y1="78" x2="48" y2="90"/>
    <line x1="42" y1="84" x2="54" y2="84"/>

    <line x1="102" y1="102" x2="102" y2="114"/>
    <line x1="96" y1="108" x2="108" y2="108"/>
  </g>

  <!-- Pontos sólidos -->
  <circle cx="78" cy="18" r="2.4" fill="#1a1a1a"/>
  <circle cx="18" cy="78" r="2.4" fill="#1a1a1a"/>
  <circle cx="108" cy="48" r="2" fill="#1a1a1a"/>
  <circle cx="48" cy="108" r="2" fill="#1a1a1a"/>

  <!-- Triângulos decorativos -->
  <polygon points="60,30 66,42 54,42" fill="#1a1a1a" opacity="0.85"/>
  <polygon points="30,60 42,66 42,54" fill="#1a1a1a" opacity="0.85"/>

  <!-- Quadrados outline -->
  <rect x="66" y="66" width="8" height="8" stroke="#1a1a1a" stroke-width="1.6" fill="none"/>
  <rect x="6" y="42" width="6" height="6" stroke="#1a1a1a" stroke-width="1.4" fill="none"/>

  <!-- Pequenos x marks -->
  <g stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round">
    <line x1="93" y1="81" x2="99" y2="87"/>
    <line x1="99" y1="81" x2="93" y2="87"/>

    <line x1="33" y1="33" x2="39" y2="39"/>
    <line x1="39" y1="33" x2="33" y2="39"/>
  </g>
</svg>
