<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Hello Kitty Face 1 (centro-esquerda) -->
  <g transform="translate(50, 55)" opacity="0.5">
    <!-- Cabeça -->
    <ellipse cx="0" cy="0" rx="18" ry="16" fill="#ff6b9d"/>
    <!-- Orelha esquerda -->
    <polygon points="-14,-14 -16,-6 -8,-10" fill="#ff6b9d"/>
    <!-- Orelha direita -->
    <polygon points="14,-14 16,-6 8,-10" fill="#ff6b9d"/>
    <!-- Rosto interior -->
    <ellipse cx="0" cy="0" rx="16" ry="14" fill="#ffcfe0"/>
    <!-- Orelha interior esquerda -->
    <polygon points="-13,-12 -14,-7 -9,-9.5" fill="#ffcfe0"/>
    <!-- Orelha interior direita -->
    <polygon points="13,-12 14,-7 9,-9.5" fill="#ffcfe0"/>
    <!-- Olho esquerdo -->
    <ellipse cx="-5.5" cy="-1" rx="2" ry="2.5" fill="#2a1520"/>
    <!-- Olho direito -->
    <ellipse cx="5.5" cy="-1" rx="2" ry="2.5" fill="#2a1520"/>
    <!-- Nariz -->
    <ellipse cx="0" cy="3" rx="1.8" ry="1.3" fill="#ffaa00"/>
    <!-- Bigode esquerdo -->
    <line x1="-8" y1="1" x2="-19" y2="-1" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="-8" y1="3" x2="-19" y2="3" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="-8" y1="5" x2="-19" y2="7" stroke="#ff6b9d" stroke-width="0.8"/>
    <!-- Bigode direito -->
    <line x1="8" y1="1" x2="19" y2="-1" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="8" y1="3" x2="19" y2="3" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="8" y1="5" x2="19" y2="7" stroke="#ff6b9d" stroke-width="0.8"/>
    <!-- Lacinho (orelha direita) -->
    <g transform="translate(13, -14)">
      <ellipse cx="-4" cy="0" rx="4.5" ry="3" fill="#ff3370" transform="rotate(-15)"/>
      <ellipse cx="4" cy="0" rx="4.5" ry="3" fill="#ff3370" transform="rotate(15)"/>
      <circle cx="0" cy="0" r="1.5" fill="#ff5590"/>
    </g>
  </g>

  <!-- Hello Kitty Face 2 (canto direito-baixo, menor) -->
  <g transform="translate(155, 155) scale(0.7)" opacity="0.35">
    <ellipse cx="0" cy="0" rx="18" ry="16" fill="#ff6b9d"/>
    <polygon points="-14,-14 -16,-6 -8,-10" fill="#ff6b9d"/>
    <polygon points="14,-14 16,-6 8,-10" fill="#ff6b9d"/>
    <ellipse cx="0" cy="0" rx="16" ry="14" fill="#ffcfe0"/>
    <polygon points="-13,-12 -14,-7 -9,-9.5" fill="#ffcfe0"/>
    <polygon points="13,-12 14,-7 9,-9.5" fill="#ffcfe0"/>
    <ellipse cx="-5.5" cy="-1" rx="2" ry="2.5" fill="#2a1520"/>
    <ellipse cx="5.5" cy="-1" rx="2" ry="2.5" fill="#2a1520"/>
    <ellipse cx="0" cy="3" rx="1.8" ry="1.3" fill="#ffaa00"/>
    <line x1="-8" y1="1" x2="-19" y2="-1" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="-8" y1="3" x2="-19" y2="3" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="-8" y1="5" x2="-19" y2="7" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="8" y1="1" x2="19" y2="-1" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="8" y1="3" x2="19" y2="3" stroke="#ff6b9d" stroke-width="0.8"/>
    <line x1="8" y1="5" x2="19" y2="7" stroke="#ff6b9d" stroke-width="0.8"/>
    <g transform="translate(13, -14)">
      <ellipse cx="-4" cy="0" rx="4.5" ry="3" fill="#ff3370" transform="rotate(-15)"/>
      <ellipse cx="4" cy="0" rx="4.5" ry="3" fill="#ff3370" transform="rotate(15)"/>
      <circle cx="0" cy="0" r="1.5" fill="#ff5590"/>
    </g>
  </g>

  <!-- Lacinho solto 1 -->
  <g transform="translate(145, 35)" opacity="0.35">
    <ellipse cx="-5" cy="0" rx="6" ry="3.5" fill="#ff3370" transform="rotate(-10)"/>
    <ellipse cx="5" cy="0" rx="6" ry="3.5" fill="#ff3370" transform="rotate(10)"/>
    <circle cx="0" cy="0" r="2" fill="#ff5590"/>
  </g>

  <!-- Lacinho solto 2 -->
  <g transform="translate(25, 145)" opacity="0.3">
    <ellipse cx="-4" cy="0" rx="5" ry="3" fill="#ff6b9d" transform="rotate(-12)"/>
    <ellipse cx="4" cy="0" rx="5" ry="3" fill="#ff6b9d" transform="rotate(12)"/>
    <circle cx="0" cy="0" r="1.8" fill="#ffb3d1"/>
  </g>

  <!-- Coração 1 -->
  <g transform="translate(105, 100)" opacity="0.3">
    <path d="M0,4 C0,-1 5,-1 5,2 C5,5 0,10 0,10 C0,10 -5,5 -5,2 C-5,-1 0,-1 0,4Z" fill="#ff6b9d"/>
  </g>

  <!-- Coração 2 -->
  <g transform="translate(20, 25)" opacity="0.2">
    <path d="M0,3 C0,-0.8 3.5,-0.8 3.5,1.5 C3.5,3.5 0,7 0,7 C0,7 -3.5,3.5 -3.5,1.5 C-3.5,-0.8 0,-0.8 0,3Z" fill="#ff8cb4"/>
  </g>

  <!-- Florzinha -->
  <g transform="translate(170, 100)" opacity="0.25">
    <circle cx="0" cy="-5" r="3" fill="#ff8cb4"/>
    <circle cx="4.8" cy="-1.5" r="3" fill="#ff8cb4"/>
    <circle cx="3" cy="4" r="3" fill="#ff8cb4"/>
    <circle cx="-3" cy="4" r="3" fill="#ff8cb4"/>
    <circle cx="-4.8" cy="-1.5" r="3" fill="#ff8cb4"/>
    <circle cx="0" cy="0" r="2" fill="#ffcfe0"/>
  </g>

  <!-- Pontinhos decorativos -->
  <circle cx="90" cy="15" r="1.5" fill="#ff6b9d" opacity="0.2"/>
  <circle cx="130" cy="75" r="1" fill="#ffb3d1" opacity="0.2"/>
  <circle cx="75" cy="130" r="1.5" fill="#ff6b9d" opacity="0.15"/>
  <circle cx="185" cy="55" r="1" fill="#ff8cb4" opacity="0.2"/>
  <circle cx="10" cy="95" r="1" fill="#ffb3d1" opacity="0.15"/>
</svg>
